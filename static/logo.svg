<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="640" height="320" fill="url(#bg)" rx="12"/>
  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#fff"/>
    </pattern>
    <rect width="640" height="320" fill="url(#dots)"/>
  </g>
  <!-- Hexagon icon -->
  <g transform="translate(80, 110)">
    <polygon points="40,-36 72,-18 72,18 40,36 8,18 8,-18" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <polygon points="40,-24 62,-12 62,12 40,24 18,12 18,-12" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <text x="40" y="6" font-family="monospace" font-size="20" font-weight="bold" fill="#06b6d4" text-anchor="middle">AF</text>
  </g>
  <!-- Title -->
  <text x="170" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#ffffff">AgentForge</text>
  <!-- Tagline -->
  <text x="170" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8">Universal CLI to manage, sync, and export AI agents</text>
  <!-- Feature tags -->
  <g transform="translate(170, 215)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="40" y="18" font-family="monospace" font-size="12" fill="#06b6d4" text-anchor="middle">CLI</text>
    <rect x="90" y="0" width="80" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="130" y="18" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="middle">TUI</text>
    <rect x="180" y="0" width="120" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="240" y="18" font-family="monospace" font-size="12" fill="#a78bfa" text-anchor="middle">5 Platforms</text>
    <rect x="310" y="0" width="110" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="365" y="18" font-family="monospace" font-size="12" fill="#34d399" text-anchor="middle">Open Source</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="290" width="640" height="30" fill="#1e293b"/>
  <text x="20" y="310" font-family="monospace" font-size="13" fill="#64748b">af</text>
  <text x="320" y="310" font-family="monospace" font-size="13" fill="#64748b" text-anchor="middle">https://github.com/Bonhollow/agentforge</text>
</svg>
